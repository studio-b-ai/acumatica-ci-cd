# Acumatica Customization CI/CD Pipeline
# Deploys customization projects via the Customization API
#
# Triggers:
#   - Push to main     → Deploy to PRODUCTION
#   - Push to staging   → Deploy to STAGING
#   - Pull request      → Validate against STAGING (no publish)
#   - Manual dispatch   → Choose target environment
#
# Required GitHub Secrets (per environment):
#   ACUMATICA_PROD_URL        - Production instance URL
#   ACUMATICA_PROD_USERNAME   - Production API user
#   ACUMATICA_PROD_PASSWORD   - Production API password
#   ACUMATICA_PROD_TENANT     - Production tenant name
#   ACUMATICA_STG_*           - Staging equivalents (same instance, test company)
#
# Required GitHub Variables:
#   CUSTOMIZATION_PROJECT_NAME  - Name of the customization project in Acumatica
#   ALSO_PUBLISH_PROJECTS       - Comma-separated list of other active projects to co-publish
#                                 (VAR packages, Shopify connector, etc.) for conflict detection

name: Deploy Acumatica Customization

on:
  push:
    branches: [main, staging]
    paths:
      - 'Customization/**'
      - 'scripts/**'
      - '.github/workflows/deploy-customization.yml'
  pull_request:
    branches: [main, staging]
    paths:
      - 'Customization/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - staging
          - production
      dry_run:
        description: 'Validate only (no publish)'
        required: false
        type: boolean
        default: false

env:
  PROJECT_NAME: ${{ vars.CUSTOMIZATION_PROJECT_NAME || 'HeritageFabricsCustom' }}
  ALSO_PUBLISH: ${{ vars.ALSO_PUBLISH_PROJECTS || '' }}
  POREL_PROJECT_NAME: StudioB_PORelations

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Build — Package customization into .zip
  # ──────────────────────────────────────────────
  build:
    name: Build Customization Package
    runs-on: ubuntu-latest
    outputs:
      package_path: ${{ steps.package.outputs.path }}
      package_name: ${{ steps.package.outputs.name }}
      has_porel: ${{ steps.package_porel.outputs.has_porel }}
      porel_path: ${{ steps.package_porel.outputs.path }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate project.xml files
        run: |
          python scripts/validate-project.py Customization/_project/project.xml
          # Validate StudioB_PORelations if it exists
          if [ -f "Customization/StudioB_PORelations/project.xml" ]; then
            python scripts/validate-project.py Customization/StudioB_PORelations/project.xml
          fi
          # Production deploys run strict mode — unsafe extension patterns become errors
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "Running strict validation for production..."
            python scripts/validate-project.py --strict Customization/_project/project.xml
            if [ -f "Customization/StudioB_PORelations/project.xml" ]; then
              python scripts/validate-project.py --strict Customization/StudioB_PORelations/project.xml
            fi
          fi

      - name: Check for C# extension library
        id: check_csproj
        run: |
          if ls Customization/*.csproj 1>/dev/null 2>&1; then
            echo "has_csproj=true" >> "$GITHUB_OUTPUT"
            echo "Found C# project — will build extension library"
          else
            echo "has_csproj=false" >> "$GITHUB_OUTPUT"
            echo "No C# project — packaging XML/ASPX only"
          fi

      - name: Setup .NET (if C# extension exists)
        if: steps.check_csproj.outputs.has_csproj == 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      - name: Build C# extension library
        if: steps.check_csproj.outputs.has_csproj == 'true'
        run: |
          cd Customization
          dotnet restore
          dotnet build --configuration Release --no-restore
          echo "Extension library built successfully"

      - name: Package customization project
        id: package
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          PACKAGE_NAME="${PROJECT_NAME}_${TIMESTAMP}.zip"
          PACKAGE_PATH="dist/${PACKAGE_NAME}"

          mkdir -p dist

          cd Customization/_project
          zip -r "../../${PACKAGE_PATH}" . \
            -x "*.DS_Store" \
            -x "__MACOSX/*" \
            -x "*.user" \
            -x "bin/*" \
            -x "obj/*"
          cd ../..

          # Include compiled DLLs if they exist
          if [ -d "Customization/bin/Release" ]; then
            cd Customization/bin/Release
            zip -ur "../../../${PACKAGE_PATH}" *.dll 2>/dev/null || true
            cd ../../..
          fi

          FILESIZE=$(du -h "${PACKAGE_PATH}" | cut -f1)
          echo "Packaged: ${PACKAGE_NAME} (${FILESIZE})"

          echo "path=${PACKAGE_PATH}" >> "$GITHUB_OUTPUT"
          echo "name=${PACKAGE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Package StudioB_PORelations
        id: package_porel
        run: |
          if [ ! -d "Customization/StudioB_PORelations" ]; then
            echo "has_porel=false" >> "$GITHUB_OUTPUT"
            echo "No StudioB_PORelations project found — skipping"
            exit 0
          fi

          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          POREL_NAME="StudioB_PORelations_${TIMESTAMP}.zip"
          POREL_PATH="dist/${POREL_NAME}"

          cd Customization/StudioB_PORelations
          zip -r "../../${POREL_PATH}" . \
            -x "*.DS_Store" \
            -x "__MACOSX/*"
          cd ../..

          FILESIZE=$(du -h "${POREL_PATH}" | cut -f1)
          echo "Packaged: ${POREL_NAME} (${FILESIZE})"

          echo "has_porel=true" >> "$GITHUB_OUTPUT"
          echo "path=${POREL_PATH}" >> "$GITHUB_OUTPUT"
          echo "name=${POREL_NAME}" >> "$GITHUB_OUTPUT"

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: customization-package
          path: dist/*.zip
          retention-days: 30

  # ──────────────────────────────────────────────
  # Job 2: Deploy — Push to Acumatica instance
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy to ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production' || 'staging') }}
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    environment:
      name: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production' || 'staging') }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download package artifact
        uses: actions/download-artifact@v4
        with:
          name: customization-package
          path: dist/

      - name: Resolve environment
        id: env
        run: |
          if [[ "${{ github.event.inputs.environment }}" == "production" ]] || [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "target=production" >> "$GITHUB_OUTPUT"
          else
            echo "target=staging" >> "$GITHUB_OUTPUT"
          fi

      # Pass secrets directly as env vars — never write them to GITHUB_OUTPUT
      - name: Deploy customization via REST API
        env:
          ACUMATICA_URL: ${{ (steps.env.outputs.target == 'production') && secrets.ACUMATICA_PROD_URL || (secrets.ACUMATICA_STG_URL || secrets.ACUMATICA_PROD_URL) }}
          ACUMATICA_USERNAME: ${{ (steps.env.outputs.target == 'production') && secrets.ACUMATICA_PROD_USERNAME || (secrets.ACUMATICA_STG_USERNAME || secrets.ACUMATICA_PROD_USERNAME) }}
          ACUMATICA_PASSWORD: ${{ (steps.env.outputs.target == 'production') && secrets.ACUMATICA_PROD_PASSWORD || (secrets.ACUMATICA_STG_PASSWORD || secrets.ACUMATICA_PROD_PASSWORD) }}
          ACUMATICA_TENANT: ${{ (steps.env.outputs.target == 'production') && secrets.ACUMATICA_PROD_TENANT || (secrets.ACUMATICA_STG_TENANT || secrets.ACUMATICA_PROD_TENANT) }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          # Main package is the one matching PROJECT_NAME; extras are everything else
          PACKAGE_FILE=$(ls dist/${PROJECT_NAME}_*.zip 2>/dev/null | head -1)
          if [ -z "${PACKAGE_FILE}" ]; then
            PACKAGE_FILE=$(ls dist/*.zip | head -1)
          fi
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"

          # Build extra-import flags for any additional packages (name:path format)
          EXTRA_FLAGS=""
          for pkg in dist/*.zip; do
            if [ "${pkg}" != "${PACKAGE_FILE}" ]; then
              # Extract project name by removing timestamp suffix (_YYYYMMDD-HHMMSS.zip)
              PKG_BASE=$(basename "${pkg}" .zip)
              PKG_NAME=$(echo "${PKG_BASE}" | sed 's/_[0-9]\{8\}-[0-9]\{6\}$//')
              EXTRA_FLAGS+=" --extra-import ${PKG_NAME}:${pkg}"
            fi
          done

          chmod +x scripts/deploy.sh
          scripts/deploy.sh \
            --project "${PROJECT_NAME}" \
            --package "${PACKAGE_FILE}" \
            --also-publish "${ALSO_PUBLISH}" \
            ${EXTRA_FLAGS} \
            $( [[ "${DRY_RUN}" == "true" ]] && echo "--validate-only" )

      # Notify Slack on deploy failure
      - name: Slack notification on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          TARGET="${{ steps.env.outputs.target }}"
          if [ -n "${SLACK_WEBHOOK_URL}" ]; then
            curl -s -X POST "${SLACK_WEBHOOK_URL}" \
              -H "Content-Type: application/json" \
              -d "{\"text\":\":x: *Acumatica Customization Deploy FAILED*\nProject: \`${PROJECT_NAME}\`\nEnvironment: \`${TARGET}\`\nCommit: \`${GITHUB_SHA::8}\`\nActor: @${GITHUB_ACTOR}\nRun: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\"}"
          fi

      - name: Post deployment summary
        if: always()
        run: |
          TARGET="${{ steps.env.outputs.target }}"
          echo "## Deployment Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Environment | \`${TARGET}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Project | \`${PROJECT_NAME}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Package | \`${{ needs.build.outputs.package_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${GITHUB_SHA::8}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Actor | @${GITHUB_ACTOR} |" >> "$GITHUB_STEP_SUMMARY"

  # ──────────────────────────────────────────────
  # Job 3: Validate — PR check (no publish)
  # ──────────────────────────────────────────────
  validate:
    name: Validate Against Staging
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download package artifact
        uses: actions/download-artifact@v4
        with:
          name: customization-package
          path: dist/

      - name: Validate customization package via REST API
        env:
          ACUMATICA_URL: ${{ secrets.ACUMATICA_STG_URL || secrets.ACUMATICA_PROD_URL }}
          ACUMATICA_USERNAME: ${{ secrets.ACUMATICA_STG_USERNAME || secrets.ACUMATICA_PROD_USERNAME }}
          ACUMATICA_PASSWORD: ${{ secrets.ACUMATICA_STG_PASSWORD || secrets.ACUMATICA_PROD_PASSWORD }}
          ACUMATICA_TENANT: ${{ secrets.ACUMATICA_STG_TENANT || secrets.ACUMATICA_PROD_TENANT }}
        run: |
          PACKAGE_FILE=$(ls dist/${PROJECT_NAME}_*.zip 2>/dev/null | head -1)
          if [ -z "${PACKAGE_FILE}" ]; then
            PACKAGE_FILE=$(ls dist/*.zip | head -1)
          fi

          # Build extra-import flags for any additional packages (name:path format)
          EXTRA_FLAGS=""
          for pkg in dist/*.zip; do
            if [ "${pkg}" != "${PACKAGE_FILE}" ]; then
              # Extract project name by removing timestamp suffix (_YYYYMMDD-HHMMSS.zip)
              PKG_BASE=$(basename "${pkg}" .zip)
              PKG_NAME=$(echo "${PKG_BASE}" | sed 's/_[0-9]\{8\}-[0-9]\{6\}$//')
              EXTRA_FLAGS+=" --extra-import ${PKG_NAME}:${pkg}"
            fi
          done

          chmod +x scripts/deploy.sh
          scripts/deploy.sh \
            --project "${PROJECT_NAME}" \
            --package "${PACKAGE_FILE}" \
            --also-publish "${ALSO_PUBLISH}" \
            ${EXTRA_FLAGS} \
            --validate-only

      - name: Post validation result
        if: always()
        run: |
          echo "## Validation Result" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ $? -eq 0 ]; then
            echo "Customization package validated against staging." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Validation failed — check logs above." >> "$GITHUB_STEP_SUMMARY"
          fi

  # ──────────────────────────────────────────────
  # Job 4: Post-Deploy Validation — trigger ui-test-suite
  # ──────────────────────────────────────────────
  post-deploy-validation:
    name: Trigger Runtime Tests
    needs: deploy
    runs-on: ubuntu-latest
    if: needs.deploy.result == 'success' && github.event_name != 'pull_request'

    steps:
      - name: Trigger ui-test-suite
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_DISPATCH }}
        run: |
          if [[ -z "${GH_TOKEN}" ]]; then
            echo "::warning::GH_PAT_DISPATCH secret not set — skipping ui-test-suite trigger"
            exit 0
          fi
          gh api repos/studio-b-ai/ui-test-suite/dispatches \
            --method POST \
            -f event_type=post-deploy-validation \
            -f "client_payload[commit]=${GITHUB_SHA::8}" \
            -f "client_payload[project]=${PROJECT_NAME}" \
            -f "client_payload[actor]=${GITHUB_ACTOR}"
          echo "Triggered ui-test-suite post-deploy-validation run"
